<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comarques Showdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
 
            --red_color: #dc3545;
            --background_color: #e0e0e0;
            --white_color: #f5f5f5;
            --jet_lag_black: #2c3e50;
            --blue_color: #15427D;
            --yellow_color: #ffc107;
            --green_color: #28a745;
            --border_radius: 16px;
        }
 
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--background_color);
            padding: 0;
        }
 
        .header {
            background-color: var(--red_color);
            color: var(--white_color);
            text-align: center;
            padding: 30px 20px;
            font-size: 32px;
            font-weight: bold;
        }
 
        .container {
            max-width: 750px;
            margin: 0 auto;
            padding: 20px;
        }
        .btn-reset {
            width: 100%;
            margin-bottom: 20px;
            background-color: var(--jet_lag_black);
            color: var(--white_color);
        }
 
        .status-card {
            background: var(--blue_color);
            color: var(--white_color);
            border-radius: var(--border_radius);
            padding: 50px 30px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
 
        .status-card h2 {
            font-size: 36px;
            margin-bottom: 30px;
            font-weight: 500;
        }
 
        .status-card p {
            font-size: 28px;
            font-weight: 300;
        }
 
        .comarca-card {
            background-color: var(--red_color);
            border-radius: var(--border_radius);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
 
        .comarca-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }
 
        .comarca-card.completed {
            background-color: var(--green_color);
        }
 
        .comarca-card.failed {
            background-color: #6c757d;
        }
 
        .comarca-header {
            background-color: transparent;
            color: var(--white_color);
            text-align: center;
            padding: 30px 20px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }
 
        .comarca-content {
            background-color: var(--white_color);
            padding: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, padding 0.3s ease-out;
        }
 
        .comarca-card.expanded .comarca-content {
            max-height: 2000px;
            padding: 40px 30px;
        }
 
        .comarca-content h3 {
            color: var(--jet_lag_black);
            font-size: 28px;
            margin-bottom: 25px;
            font-weight: 600;
        }
 
        .comarca-content .reto-text {
            color: var(--jet_lag_black);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
            white-space: pre-line;
        }
 
        .comarca-content .additional-info {
            color: #6c757d;
            font-size: 14px;
            font-style: italic;
            line-height: 1.5;
            margin-bottom: 30px;
            padding: 15px;
            background-color: #f8f9fa;
            border-left: 4px solid var(--yellow_color);
            border-radius: 4px;
        }
 
        .button-group {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }
 
        .btn {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
 
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
 
        .btn-fallar {
            background-color: var(--yellow_color);
            color: var(--jet_lag_black);
        }
 
        .btn-completar {
            background-color: var(--blue_color);
            color: var(--white_color);
        }
 
        @media (max-width: 600px) {
            .header {
                font-size: 24px;
                padding: 20px;
            }
 
            .status-card h2 {
                font-size: 28px;
            }
 
            .status-card p {
                font-size: 22px;
            }
 
            .comarca-header {
                font-size: 22px;
                padding: 25px 15px;
            }
 
            .comarca-content h3 {
                font-size: 22px;
            }
 
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        Comarques Showdown!
    </div>
 
    <div class="container">
        <!-- Status Card -->
        <div class="status-card">
            <h2 id="players-names">User1 & User2</h2>
            <p id="stats">0 Visitadas / 0 Conquistadas</p>
        </div>
 
        <!-- Comarca Cards (populated dynamically) -->
        <div id="comarca-list">
            <!-- Dynamically filled -->
        </div>

        <button class="btn btn-reset" onclick="resetGame()">
            Reiniciar partida
        </button>
    </div>
 
    <script>
        // Sample data structure
        const data = [
            {
                index: 0,
                comarca: "Camp de Turia",
                enunciado: "Puntería Fluvial",
                reto: "Busca 10 piedras planas y lisas. Desde una orilla de un cauce natural, debes lanzar las piedras intentando que lleguen a la orilla opuesta sin hundirse en el agua. Para completar el desafío, al menos 3 de tus 10 piedras deben llegar al otro lado. Cada piedra solo puede lanzarse una vez. Graba tus lanzamientos como prueba.",
                additionalInfo: ""
            },
            {
                index: 1,
                comarca: "Camp de Morvedre",
                enunciado: "Catulo y las Ruinas Romanas",
                reto: "El nombre Morvedre procede del latín 'muri veteri', que significa 'muros viejos', en alusión a la antigüedad de sus murallas defensivas. Visita una ruina o castillo de la época romana y recita de memoria al menos 10 versos de un poema en latín frente al monumento.\nPuedes practicar tantas veces como quieras, pero solo tienes una oportunidad para grabar tu recitación final.",
                additionalInfo: "Catullus fue un poeta romano, el cual tuvo un romance con 'Lesbia', el pseudónimo de otra poeta de la época a que le acabó dedicando 25 poemas. En algunos de sus poemas utiliza la Estrofa Sáfica, una estrofa de cuatro versos, tres endecasílabos y un pentasílabo."
            },
            {
                index: 2,
                comarca: "Horta Nord",
                enunciado: "Cerámica Nolla",
                reto: "La Horta Nord es famosa por dos cosas: la horchata y los mosaicos. La cerámica Nolla es un tipo de teselas cerámicas geométricas que juntas crean mosaicos chulísimos.\nDeberéis encontrar al menos 3 mosaicos de cerámica Nolla diferentes y hacer una foto de cada uno de ellos. Tenéis 20 minutos para conseguirlo.",
                additionalInfo: ""
            },
            {
                index: 3,
                comarca: "Horta Sud",
                enunciado: "Encuentra un DJUNGELSKOG",
                reto: "Ve a IKEA y encuentra un DJUNGELSKOG en menos de 25 minutos desde que entras en la tienda. No puedes buscar qué es un DJUNGELSKOG, ni puedes pedir ayuda a nadie.\nNo hace falta que lo compres, solo envía una foto tuya con el DJUNGELSKOG para demostrar que lo has encontrado.",
                additionalInfo: ""
            },
            {
                index: 4,
                comarca: "Foia de Bunyol",
                enunciado: "Geocaché a Ciegas",
                reto: "Encuentra y registra un geocaché sin usar la aplicación durante la búsqueda final. Solo puedes mirar las coordenadas una vez antes de empezar, luego debes confiar en tu memoria y orientación natural para localizarlo. Toma una foto del geocaché encontrado y del registro firmado como prueba.",
                additionalInfo: ""
            },
            {
                index: 5,
                comarca: "Ribera Alta",
                enunciado: "Zumo Recién Exprimido",
                reto: "La Ribera Alta es famosa por sus naranjas desde el siglo XVIII y es una de las principales productoras de cítricos de España.\nConsigue naranjas frescas y exprime a mano suficientes naranjas para llenar un vaso de 250ml de zumo natural. Graba el proceso de exprimido y bebe el zumo al final.\nSolo puedes usar tus propias manos para exprimirlas.",
                additionalInfo: "El cultivo racional de la naranja comenzó en esta comarca en el siglo XVIII y sigue siendo el motor principal de su economía agrícola. Las naranjas valencianas son reconocidas mundialmente por su sabor y calidad."
            },
            {
                index: 6,
                comarca: "Ribera Baixa",
                enunciado: "Mural de Memoria",
                reto: "Visita un lugar emblemático de la comarca. Observa el lugar durante exactamente 5 minutos, memorizando todos los detalles posibles. Luego aléjate del monumento y, sin mirar fotos ni volver a verlo, debes recrear la escena dibujándola. Tienes 30 minutos para completar tu obra. Toma una foto del lugar visitado para luego compararlo con el dibujo terminado.",
                additionalInfo: ""
            },
            {
                index: 7,
                comarca: "Horta Oest",
                enunciado: "¿Quién es Quién en el Cielo?",
                reto: "Ve al Aeropuerto de Valencia. Durante 30 minutos, observa los aviones que hay. Debes identificar y describir correctamente al menos 5 aviones diferentes sin mencionar explícitamente el nombre de la aerolínea ni textos visibles. Tu compañero debe adivinar la aerolínea basándose solo en tu descripción. Deben acertar al menos 3 de 5 para completar el reto.",
                additionalInfo: ""
            },
            {
                index: 8,
                comarca: "Valencia Nord",
                enunciado: "Alimentando a los Patos",
                reto: "Ve a un parque con estanque o lago y alimenta a los patos salvajes. Debes conseguir que al menos 5 patos diferentes coman directamente de lo que les ofrezcas. Graba un vídeo como prueba mostrando a los patos acercándose y comiendo. Recuerda usar alimentos apropiados para patos como lechuga, guisantes, maíz o avena (no pan, ya que no es saludable para ellos).",
                additionalInfo: "Aunque el pan es el alimento más común que la gente da a los patos, no es nutritivo para ellos y puede causar problemas de salud. Los patos prefieren vegetales como lechuga troceada, guisantes congelados (descongelados), maíz, avena, uvas cortadas por la mitad o comida especializada para aves acuáticas."
            },
            {
                index: 9,
                comarca: "Valencia Sud",
                enunciado: "Peregrinación de los Ilustres",
                reto: "Visita el Cementerio General de Valencia y localiza las tumbas de al menos 3 personajes ilustres valencianos enterrados allí. Investiga previamente quiénes están sepultados y sus contribuciones a la historia, cultura o sociedad valenciana. En cada tumba, graba un breve vídeo (máximo 1 minuto) explicando quién fue esa persona y por qué es importante para Valencia. Debes visitar las tres tumbas en una sola visita.",
                additionalInfo: "El Cementerio General de Valencia, inaugurado en 1807, alberga las tumbas de numerosos personajes ilustres como Blasco Ibáñez (escritor), Joaquín Sorolla (pintor), o Concha Piquer (cantante y actriz), entre muchos otros. Además de ser un lugar de memoria histórica, el cementerio es considerado un museo al aire libre por su valor artístico y arquitectónico."
            },
            {
                index: 10,
                comarca: "Albufera",
                enunciado: "Recrea una Barraca en miniatura",
                reto: "Visita la Albufera de Valencia y observa las barracas tradicionales valencianas. Usando solo materiales naturales que encuentres en el entorno de la Albufera (cañas, juncos, ramas, barro, piedras pequeñas), crea una maqueta de una barraca de al menos 20cm de alto. Debe tener el techo característico a dos aguas. Tienes 45 minutos desde que recoges el primer material. Toma una foto de tu barraca con la Albufera de fondo como prueba.",
                additionalInfo: ""
            },
            {
                index: 11,
                comarca: "La Safor",
                enunciado: "Corriente Contra Reloj",
                reto: "Busca un arroyo y marca dos puntos del arroyo separados por 50 metros. Antes de empezar, debes calcular cuánto tiempo tardará un objeto flotante en recorrer esa distancia. Luego lanza el objeto y cronometra el tiempo.\nPara completar el desafío, tu estimación debe estar dentro de un margen de error de ±10 segundos. Tienes 3 intentos.",
                additionalInfo: ""
            },
            {
                index: 12,
                comarca: "La Costera",
                enunciado: "Abre un Museo Impopular",
                reto: "Ve a cualquier museo de la comarca y pasa 20 minutos recreando tres cosas que encuentres allí. Marca un área de 1,2m x 1,2m y coloca tus 3 objetos recreados y un cartel con el nombre de tu museo dentro - este es tu nuevo museo. En los siguientes 10 minutos, si algún desconocido pasa más de 5 segundos dentro de tu museo, fracasas. Al menos 5 desconocidos deben visitar y marcharse de tu museo durante los 10 minutos o debes empezar de nuevo.",
                additionalInfo: ""
            },
            {
                index: 13,
                comarca: "La Vall d'Albaida",
                enunciado: "Waffle Pong",
                reto: "Consigue un gofre y un envase o paquete de comida pequeña que quepa en los agujeros del gofre (piensa en M&M's, ositos de gominola, guisantes, ese tipo de cosas). Coloca el gofre a 2 metros de distancia. Debes conseguir que una unidad de comida pequeña aterrice en cada uno de los agujeros completos del gofre para ganar.\nSolo puedes lanzar cada unidad de comida una vez. Si te quedas sin comida pequeña y no has rellenado el gofre, fracasas.\nIndependientemente del resultado, debes comerte el gofre y todo lo que hayas conseguido meter en él al final del desafío.",
                additionalInfo: ""
            },
            {
                index: 14,
                comarca: "Plana Baixa",
                enunciado: "Mata el Tiempo, Luego Dilo",
                reto: "Tu tarea es completar tres de las cinco actividades mata-tiempo de la lista a continuación, y luego adivinar cuánto tiempo ha transcurrido. No puedes mirar ningún reloj, ni puedes ver el tiempo transcurrido en tu teléfono de grabación. Para completar el desafío, tu estimación debe estar dentro de los 5 minutos del tiempo real transcurrido. Tus opciones son: <ul><li> Moja completamente un objeto y observa cómo se seca por completo.</li><li> Desempaca y reempaca cada objeto de tus mochilas diez veces.</li><li> Nombra 100 personas valencianas reales diferentes.</li><li> Haz 200 jumping jacks cada uno.</li><li> Juega 5 rondas exitosas de veinte preguntas.</li></ul>",
                additionalInfo: ""
            },
            {
                index: 15,
                comarca: "La Plana Alta",
                enunciado: "Salvamento del Huevo",
                reto: "Ve a un supermercado y compra materiales para proteger a un huevo. Solo puedes usar elementos o productos que encuentres en el supermercado. Tienes un presupuesto máximo de 10€ y 15 minutos para hacer tus compras. Luego, usando únicamente los materiales comprados, construye una estructura protectora alrededor de un huevo crudo. Encuentra un lugar donde puedas lanzar tu huevo protegido desde una altura de al menos 5 metros. Ambos participantes del equipo deben lanzar su huevo. Para completar el desafío, los dos huevos deben sobrevivir intactos a la caída sin romperse.",
                additionalInfo: "Si hay alguna duda sobre el reto, William Osman tiene una serie donde ejecuta este reto y explica las normas del mismo"
            },
            { 
                index: 16,
                comarca: "La Llotja de la Seda",
                enunciado: "Las Tres Murallas Históricas de Valencia",
                reto: "Valencia estuvo protegida por tres murallas distintas a lo largo de su historia.\nTendréis que encontrar y fotografiar un fragmento visible de cada una de las tres murallas.\nAdemás, deberéis atravesar tres puertas diferentes, cada una perteneciente a, al menos, dos murallas distintas, y haceros un selfie justo al pasar por dentro de cada una.\nSolo tenéis un intento para completar el reto. Podéis planificar la ruta, pero todas las fotos deben hacerse durante la prueba. Si no conseguís las tres murallas y las tres puertas correctamente, falláis.",
                additionalInfo: "La muralla musulmana tiene puertas en las que sus construcciones no corresponden a la época de construcción de la muralla, sino que son posteriores, siguen siendo válidas como parte de la muralla musulmana."
            }
        ];
 
        // Game state
        let gameState = {
            players: "User1 & User2",
            visitadas: 0,
            conquistadas: 0,
            activeChallenge: null,
            comarcasStatus: {}, // { index: 'pending' | 'completed' | 'failed' }
            visitedComarcas: new Set() // Track which comarcas have been visited
        };
 
        // Initialize the game
        function init() {
            const loaded = loadGame();

            if (!loaded) {
                askForPlayersNames();
            }
            renderComarcaList();
            updateStats();
        }

        function askForPlayersNames() {
            let player1 = '';
            let player2 = '';

            // Pedir nombre jugador 1
            while (!player1) {
                player1 = prompt('Introduce el nombre del Jugador 1:');
                if (player1 === null) player1 = ''; // evitar cancelar
            }

            // Pedir nombre jugador 2
            while (!player2) {
                player2 = prompt('Introduce el nombre del Jugador 2:');
                if (player2 === null) player2 = '';
            }

            // Guardar en el estado
            gameState.players = `${player1} & ${player2}`;

            // Actualizar UI
            document.getElementById('players-names').textContent = gameState.players;
            
            saveGame();
        }

        function saveGame() {
            const stateToSave = {
                ...gameState,
                visitedComarcas: Array.from(gameState.visitedComarcas) // convertir Set → Array
            };

            localStorage.setItem('comarquesGameState', JSON.stringify(stateToSave));
        }

        function loadGame() {
            const saved = localStorage.getItem('comarquesGameState');
            
            if (!saved) return false;

            const parsed = JSON.parse(saved);

            gameState = {
                ...parsed,
                visitedComarcas: new Set(parsed.visitedComarcas || [])
            };

            // Actualizar nombres en UI
            document.getElementById('players-names').textContent = gameState.players;

            return true;
        }
 
        function resetGame() {
            const confirmed = confirm(
                '¿Estás seguro de que quieres reiniciar la partida?\n' +
                'Se borrarán todos los datos guardados y no se podrá deshacer.'
            );

            if (!confirmed) return;

            // Borrar datos guardados
            localStorage.removeItem('comarquesGameState');

            // Recargar la página
            location.reload();
        }
        // Render all comarca cards
        function renderComarcaList() {
            const container = document.getElementById('comarca-list');
            container.innerHTML = '';
            
            data.forEach(challenge => {
                const card = document.createElement('div');
                card.className = 'comarca-card';
                card.dataset.index = challenge.index;
                
                // Apply status classes
                const status = gameState.comarcasStatus[challenge.index];
                if (status === 'completed') {
                    card.classList.add('completed');
                } else if (status === 'failed') {
                    card.classList.add('failed');
                }
                
                // Check if this is the active challenge
                if (gameState.activeChallenge === challenge.index) {
                    card.classList.add('expanded');
                }
                
                card.innerHTML = `
                    <div class="comarca-header" onclick="toggleChallenge(${challenge.index})">
                        ${challenge.comarca}
                    </div>
                    <div class="comarca-content">
                        <h3>${challenge.enunciado}</h3>
                        <div class="reto-text">${challenge.reto}</div>
                        ${challenge.additionalInfo ? `<div class="additional-info"><strong>Información adicional:</strong> ${challenge.additionalInfo}</div>` : ''}
                        <div class="button-group">
                            <button class="btn btn-fallar" onclick="event.stopPropagation(); failChallenge(${challenge.index})">Fallar</button>
                            <button class="btn btn-completar" onclick="event.stopPropagation(); completeChallenge(${challenge.index})">Completar</button>
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
 
        // Toggle a specific challenge
        function toggleChallenge(index) {
            const challenge = data.find(c => c.index === index);
            if (!challenge) return;
            
            const card = document.querySelector(`.comarca-card[data-index="${index}"]`);
            const isExpanded = card.classList.contains('expanded');
            
            // If trying to expand a different card while one is open
            if (!isExpanded && gameState.activeChallenge !== null && gameState.activeChallenge !== index) {
                const currentChallenge = data.find(c => c.index === gameState.activeChallenge);
                const confirmed = confirm(
                    `Ya tienes abierto el desafío de ${currentChallenge.comarca}. ` +
                    `Para abrir ${challenge.comarca}, debes renunciar y fallar el desafío anterior. ¿Confirmar?`
                );
                
                if (!confirmed) {
                    return; // User cancelled, keep current challenge open
                }
                
                // Fail the current challenge
                failChallenge(gameState.activeChallenge);
            }
            
            // If card is already expanded, just collapse it
            if (isExpanded) {
                const challenge = data.find(c => c.index === index);

                const confirmed = confirm(
                    `Estás a punto de cerrar el reto de ${challenge.comarca}. ` +
                    `Esto contará como reto fallido. ¿Quieres continuar?`
                );

                if (!confirmed) {
                    return; // Cancelar cierre
                }

                // Marcar como fallido
                failChallenge(index);
                return;
            }
            
            // Check if this comarca hasn't been visited yet
            if (!gameState.visitedComarcas.has(index)) {
                const confirmed = confirm(`¿Quieres leer el desafío de ${challenge.comarca}?`);
                if (!confirmed) {
                    return; // User cancelled, don't show the challenge
                }
                
                // Mark as visited and increment count
                gameState.visitedComarcas.add(index);
                gameState.visitadas++;
                updateStats();
                saveGame();
            }
            
            // Expand this card
            card.classList.add('expanded');
            gameState.activeChallenge = index;
            
            // Scroll to the card
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
 
        // Complete a challenge
        function completeChallenge(index) {
            const status = gameState.comarcasStatus[index];

            // Bloquear si ya está fallido
            if (status === 'failed') {
                alert('Este reto ya ha sido fallado y no puede completarse.');

                // 🔽 Colapsar la tarjeta
                const card = document.querySelector(`.comarca-card[data-index="${index}"]`);
                if (card) {
                    card.classList.remove('expanded');
                }
                gameState.activeChallenge = null;

                return;
            }

            const wasCompleted = status === 'completed';

            if (!wasCompleted) {
                gameState.conquistadas++;
            }

            gameState.comarcasStatus[index] = 'completed';

            // Collapse the card
            const card = document.querySelector(`.comarca-card[data-index="${index}"]`);
            if (card) {
                card.classList.remove('expanded');
            }
            gameState.activeChallenge = null;

            updateStats();
            renderComarcaList();
            saveGame();
        }
 
        // Fail a challenge
        function failChallenge(index) {
            const status = gameState.comarcasStatus[index];

            // Si ya está fallado, no hacer nada
            if (status === 'failed') {
                alert('Este reto ya ha sido marcado como fallido.');

                // Colapsar si estaba abierto
                const card = document.querySelector(`.comarca-card[data-index="${index}"]`);
                if (card) {
                    card.classList.remove('expanded');
                }
                gameState.activeChallenge = null;

                return;
            }

            gameState.comarcasStatus[index] = 'failed';
            
            // Collapse the card
            const card = document.querySelector(`.comarca-card[data-index="${index}"]`);
            if (card) {
                card.classList.remove('expanded');
            }
            gameState.activeChallenge = null;
            
            updateStats();
            renderComarcaList();
            saveGame();
        }
 
        // Update stats display
        function updateStats() {
            document.getElementById('stats').textContent = 
                `${gameState.visitadas} Visitadas / ${gameState.conquistadas} Conquistadas`;
        }
 
        // Initialize on page load
        init();
    </script>
</body>
</html>
