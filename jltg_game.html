<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        margin: auto;
        max-width: 90vw;
    }
    .wrapper{
        border: 1px solid;

        display: flex;
        flex-direction: column;
        padding: 1em;
    }

</style>
<script>

    function displayComarcas(data) {
        // Get the template and container
        const template = document.querySelector('.comarca_div');
        const container = document.body; // or specify a different container
        
        // Loop through each entry in the data
        data.forEach(item => {
            // Clone the template content
            const clone = template.content.cloneNode(true);
            
            // Fill in the data
            clone.querySelector('.comarca_text').textContent = item.comarca;
            clone.querySelector('.comarca_enunciado').textContent = item.enunciado;
            clone.querySelector('.comarca_reto').textContent = item.reto;
            clone.querySelector('.comarca_additionalInfo').textContent = item.additionalInfo;
            
            // Append to the page
            container.appendChild(clone);
        });
    }

    window.addEventListener('load', function() {
    const data = [
        {
            index: 1,
            comarca: "La Plana Alta",
            enunciado: "Salvamento del Huevo",
            reto: "Ve a un supermercado y compra materiales para proteger a un huevo. Solo puedes usar elementos o productos que encuentres en el supermercado. Tienes un presupuesto máximo de 10€ y 15 minutos para hacer tus compras. Luego, usando únicamente los materiales comprados, construye una estructura protectora alrededor de un huevo crudo. Encuentra un lugar donde puedas lanzar tu huevo protegido desde una altura de al menos 5 metros. Ambos participantes del equipo deben lanzar su huevo. Para completar el desafío, los dos huevos deben sobrevivir intactos a la caída sin romperse.",
            additionalInfo: "Si hay alguna duda sobre el reto, William Osman tiene una serie donde ejecuta este reto y explica las normas del mismo"
        },
        {
            index: 2,
            comarca: "La Llotja de la Seda",
            enunciado: "Las Tres Murallas Históricas de Valencia",
            reto: "Valencia estuvo protegida por tres murallas distintas a lo largo de su historia.\nTendréis que encontrar y fotografiar un fragmento visible de cada una de las tres murallas.\nAdemás, deberéis atravesar tres puertas diferentes, cada una perteneciente a, al menos, dos murallas distintas, y haceros un selfie justo al pasar por dentro de cada una.\nSolo tenéis un intento para completar el reto. Podéis planificar la ruta, pero todas las fotos deben hacerse durante la prueba. Si no conseguís las tres murallas y las tres puertas correctamente, falláis.",
            additionalInfo: "La muralla musulmana tiene puertas en las que sus construcciones no corresponden a la época de construcción de la muralla, sino que son posteriores, siguen siendo válidas como parte de la muralla musulmana."
        }
    ];
    
    displayComarcas(data);
});
</script>
<body>

    <div id="district_wrapper" onload="load_data()"></div>

    <template class="comarca_div">
        <div class="wrapper">
            <p class="comarca_text"></p>
            <p class="comarca_enunciado"></p>
            <p class="comarca_reto"></p>
            <p class="comarca_additionalInfo"></p>
        </div>
    </template>
    <button onclick="clear_lc()">clear LocalStorage</button>
</body>
</html>
